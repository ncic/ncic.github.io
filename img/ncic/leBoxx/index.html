/* Component: Contains the gray background with padding which acts as the space around the content (aka margin) */
.component
{
    padding: 1rem;
    background-color: lightgray;
    /* Role: Presentation - to show the changing color of the space around the content */
    animation: 2s infinite alternate ease-in-out breathing-color--dark;
}
 
/* Role: Presentation */
@keyframes breathing-color--dark
{
    from{ background-color: lightgray;}
    to
    { background-color: blue;}
}
 
/* Container: Contains the white background and text content */
.container
{
    padding: 1rem;
    background-color: white;
}
